org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Suppress Kotlin JVM target mismatch errors from Flutter plugins (flutter_tts,
# receive_sharing_intent, etc.) that set Java 11/8 while Kotlin 2.2.20 defaults
# to a higher target. Known Flutter + Kotlin 2.x compatibility issue.
kotlin.jvm.target.validation.mode=WARNING
