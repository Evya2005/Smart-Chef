name: smart_chef
description: Smart Chef — AI-powered recipe manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management — using 3.x for Dart 3.11 compatibility
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_ai: ^3.9.0

  # Routing
  go_router: ^17.2.1

  # File handling
  file_picker: ^11.0.2
  image_picker: ^1.1.2

  # Networking
  http: ^1.2.2
  html: ^0.15.4
  flutter_facebook_auth: ^7.0.1

  # PDF
  syncfusion_flutter_pdf: ^33.1.49

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # AI — direct Gemini access with user-provided API key
  google_generative_ai: ^0.4.6

  # Utilities
  uuid: ^4.4.2
  intl: ^0.20.0
  cached_network_image: ^3.3.1
  gap: ^3.0.1
  share_plus: ^12.0.2
  receive_sharing_intent: ^1.8.1
  flutter_local_notifications: ^21.0.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  url_launcher: ^6.3.1
  font_awesome_flutter: ^10.8.0

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.11
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0

  # Testing
  fake_cloud_firestore: ^4.0.0
  mockito: ^5.4.4

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  # Android adaptive icon (API 26+): logo on terracotta background
  android: true
  ios: true
  image_path: "logo2_padded.png"
  adaptive_icon_background: "#B7461F"
  adaptive_icon_foreground: "logo2_padded.png"
  # Solid terracotta background for older Android + iOS
  background_color: "#B7461F"
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
